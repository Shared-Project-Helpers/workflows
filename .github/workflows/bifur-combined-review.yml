name: 'Bifur (Combined) — Combined Review'

on:
  workflow_call:
    inputs:
      app_id:
        description: 'GitHub App ID (varies per consumer repo)'
        required: false
        default: ''
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      APP_PRIVATE_KEY:
        required: false
    outputs:
      decision:
        description: 'Overall review decision (worst-case across all domains)'
        value: ${{ jobs.review.outputs.decision }}
      pr_number:
        description: 'Pull request number'
        value: ${{ jobs.review.outputs.pr_number }}
      head_ref:
        description: 'PR head branch ref'
        value: ${{ jobs.review.outputs.head_ref }}

jobs:
  review:
    uses: ./.github/workflows/claude-combined-review.yml
    with:
      reviewer_name: 'Bifur (Combined)'
      enable_perf_review: 'true'
      enable_safety_review: 'true'
      enable_test_review: 'true'
      run_semgrep: 'true'
      run_gitleaks: 'true'
      perf_guidelines: |
        - Watch for N+1 patterns in Ktor client calls
        - Ensure Kotlin coroutines are used properly (no blocking in suspend functions)
        - Check for efficient use of Compose state (avoid unnecessary recompositions)
        - Verify KMP shared module does not pull platform-specific heavy dependencies
        - Check for proper resource cleanup in multiplatform code (streams, connections)
      safety_guidelines: |
        - Never commit API keys, secrets, or credentials
        - Ensure Ktor client uses HTTPS for all external calls
        - Check for proper certificate pinning on mobile clients
        - Verify no PII is logged or stored unencrypted
        - SwiftUI: check for proper Keychain usage for sensitive data
        - Android: check for proper EncryptedSharedPreferences usage
      test_guidelines: |
        - Kotlin Multiplatform: check for shared module tests (commonTest, androidUnitTest, iosTest, jvmTest, jsTest)
        - Compose UI: check for Compose UI tests using createComposeRule
        - Ktor client: check for MockEngine-based tests for HTTP calls
        - Verify test naming follows conventions (should_expectedResult_when_condition)
        - Check for proper coroutine test usage (runTest, TestDispatcher)
        - Ensure platform-specific code has platform-specific tests
      app_id: ${{ inputs.app_id }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
