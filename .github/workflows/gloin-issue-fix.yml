name: 'Glóin (Fix) — Issue Fix Agent'

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number to fix'
        required: true
        type: string
      app_id:
        description: 'GitHub App ID (varies per consumer repo)'
        required: false
        default: ''
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      PAT:
        required: false
      APP_PRIVATE_KEY:
        required: false
    outputs:
      files_changed:
        description: 'Number of files changed'
        value: ${{ jobs.fix.outputs.files_changed }}
      fixes_applied:
        description: 'Number of fixes successfully applied'
        value: ${{ jobs.fix.outputs.fixes_applied }}
      fixes_deferred:
        description: 'Number of issues deferred to GitHub Issues'
        value: ${{ jobs.fix.outputs.fixes_deferred }}
      issues_created:
        description: 'Number of GitHub Issues created'
        value: ${{ jobs.fix.outputs.issues_created }}

jobs:
  fix:
    uses: ./.github/workflows/claude-issue-fix.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      fixer_name: 'Glóin (Fix)'
      commit_author_name: 'Glóin'
      commit_author_email: 'gloin@temporal-company.com'
      app_id: ${{ inputs.app_id }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PAT: ${{ secrets.PAT }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
